<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mibenglish - 1000 Langkah Mahir Bahasa Inggris</title>
    
    <meta name="description" content="Metode belajar bahasa Inggris menyenangkan. 1000 episode lengkap.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mibenglish.github.io/index.html" />

    <style>
        :root {
            --bg-page: #F8FAF9;
            --bg-card: #FFFFFF;
            --primary: #0D4F3C;
            --primary-light: #1A7A5E;
            --secondary: #2D9B6A;
            --accent: #B8F4D8;
            --text-main: #1A2F26;
            --text-sub: #5C7A6E;
            --border: #E2EDE8;
            --radius: 12px;
            --shadow-sm: 0 1px 3px rgba(13, 79, 60, 0.06);
            --shadow: 0 4px 16px rgba(13, 79, 60, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0.85rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .brand-logo span { color: var(--secondary); }

        .header-stats {
            display: none; /* Hidden di mobile default */
            align-items: center;
            gap: 1.5rem;
            font-size: 0.85rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-sub);
        }
        .stat-item strong { color: var(--primary); }

        /* Navigation Tabs */
        .nav-tabs {
            background: white;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
        }
        .nav-tabs::-webkit-scrollbar { display: none; } /* Chrome */

        .nav-tabs-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            padding: 0.6rem 0.75rem;
            gap: 6px;
        }

        .tab-btn {
            flex-shrink: 0;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover { border-color: var(--secondary); color: var(--primary); }
        .tab-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

        /* Main Content */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem 0.75rem 3rem;
        }

        /* Season Header */
        .season-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 1.25rem 1.25rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .season-header::before {
            content: "";
            position: absolute;
            top: -50%; right: -20%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .season-header h1 {
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            position: relative;
            line-height: 1.3;
        }

        .season-header p {
            font-size: 0.85rem;
            opacity: 0.9;
            position: relative;
            line-height: 1.4;
        }

        .season-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.75rem;
            font-size: 0.75rem;
            opacity: 0.9;
        }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            flex-direction: column; /* Stack vertikal di mobile */
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: white;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .search-box svg {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            width: 16px;
            height: 16px;
        }

        .per-page-select {
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Pindah ke kanan atau kiri? kita buat flex-end */
            gap: 8px;
        }

        .per-page-select label {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .per-page-select select {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            background: white;
            cursor: pointer;
        }

        /* Episode Grid - Mobile First (1 Kolom) */
        .episode-grid {
            display: grid;
            grid-template-columns: 1fr; /* Default 1 kolom untuk mobile */
            gap: 10px;
        }

        .ep-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .ep-card:active {
            background: #f5f5f5;
            transform: scale(0.99);
        }

        .ep-num {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            background: var(--bg-page);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--primary);
        }

        .ep-info {
            flex: 1;
            min-width: 0; /* Penting agar flex item bisa shrink */
            overflow: hidden;
        }

        .ep-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            /* Izinkan 2 baris di mobile, sisanya titik-titik */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.35;
        }

        .ep-theme {
            font-size: 0.75rem;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .ep-arrow {
            display: none; /* Sembunyikan panah di mobile untuk hemat space */
        }

        /* Pagination - Compact Mobile Style */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-sub);
            cursor: pointer;
        }

        .page-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .page-btn:disabled { opacity: 0.3; cursor: default; }

        .page-dots { padding: 0 4px; color: var(--text-sub); font-size: 0.8rem; }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-sub);
            text-align: center;
            margin-top: 0.75rem;
        }

        /* Footer */
        footer {
            background: white;
            border-top: 1px solid var(--border);
            padding: 2rem 1rem 1.5rem;
            margin-top: 2rem;
        }
        .footer-inner { max-width: 1000px; margin: 0 auto; text-align: center; }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .footer-links a {
            font-size: 0.8rem;
            color: var(--text-sub);
            text-decoration: none;
        }
        .footer-links a:hover { color: var(--primary); text-decoration: underline; }

        .socials { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
        .social-btn {
            padding: 6px 14px;
            background: var(--bg-page);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
            text-decoration: none;
        }
        .social-btn:hover { background: var(--primary); color: white; }

        .copyright { font-size: 0.7rem; color: #999; margin-top: 1rem; }

        /* ==========================================
           RESPONSIVE UNTUK TABLET & DESKTOP
           ========================================== */
        @media (min-width: 480px) {
            /* Kontrol jadi sejajar */
            .controls-bar {
                flex-direction: row;
                align-items: center;
            }
            .search-box { width: auto; flex: 1; }
            
            /* Grid jadi 2 kolom */
            .episode-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            
            .ep-card { padding: 1rem 1.25rem; gap: 1rem; }
            .ep-num { width: 40px; height: 40px; font-size: 0.9rem; }
            .ep-title { font-size: 0.95rem; }
        }

        @media (min-width: 768px) {
            /* Header stats muncul */
            .header-stats { display: flex; }
            
            /* Navigasi lebih longgar */
            .nav-tabs-inner { padding: 0.75rem 1rem; gap: 8px; }
            .tab-btn { font-size: 0.85rem; padding: 0.6rem 1.2rem; }
            
            /* Season header lebih besar */
            .season-header { padding: 1.5rem 2rem; }
            .season-header h1 { font-size: 1.3rem; }
            .season-header p { font-size: 0.9rem; }
            
            /* Grid jadi 3 kolom */
            .episode-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            /* Panah muncul lagi */
            .ep-arrow {
                display: flex;
                flex-shrink: 0;
                width: 28px; height: 28px;
                background: var(--bg-page);
                border-radius: 50%;
                align-items: center;
                justify-content: center;
                color: var(--text-sub);
                font-size: 0.8rem;
            }
            .ep-card:hover .ep-arrow {
                background: var(--primary);
                color: white;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-sub);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="https://mibenglish.github.io/index.html" class="brand-logo">mib<span>english</span></a>
            <div class="header-stats">
                <div class="stat-item"><strong>1000</strong> Episode</div>
                <div class="stat-item"><strong>10</strong> Musim</div>
            </div>
        </div>
    </header>

    <nav class="nav-tabs">
        <div class="nav-tabs-inner" id="navTabs"></div>
    </nav>

    <main>
        <div class="season-header">
            <h1 id="seasonTitle">Memuat...</h1>
            <p id="seasonDesc">Silakan pilih musim pembelajaran.</p>
            <div class="season-meta">
                <span id="episodeRange">-</span>
            </div>
        </div>

        <div class="controls-bar">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Cari nomor atau judul episode...">
            </div>
            <div class="per-page-select">
                <label>Tampil:</label>
                <select id="perPageSelect">
                    <option value="30">30</option>
                    <option value="50" selected>50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>

        <div id="episodeGrid" class="episode-grid"></div>
        <div id="pagination" class="pagination"></div>
        <div id="pageInfo" class="page-info"></div>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-links">
                <a href="https://mibenglish.github.io/index.html">Beranda</a>
                <a href="https://mibenglish.github.io/about.html">About</a>
                <a href="https://mibenglish.github.io/privacy.html">Privacy</a>
                <a href="https://mibenglish.github.io/terms.html">Terms</a>
                <a href="https://mibenglish.github.io/contact.html">Contact</a>
            </div>
            <div class="socials">
                <a href="https://youtube.com/@mibenglish" target="_blank" class="social-btn">YouTube</a>
                <a href="https://tiktok.com/@mibenglish" target="_blank" class="social-btn">TikTok</a>
                <a href="https://instagram.com/@mibenglish" target="_blank" class="social-btn">Instagram</a>
            </div>
            <p class="copyright">&copy; 2025 mibenglish.</p>
        </div>
    </footer>

<script>
const LINK_PREFIX = "https://mibenglish.github.io/eps";
const LINK_SUFFIX = ".html";

// Data Musim
const seasons = [
    { title: "Musim 1: Awal Kebangkitan", desc: "Fondasi otak dan kosakata dasar.", themes: [{ name: "Cognitive Reset", count: 10 }, { name: "Survival Kit", count: 20 }, { name: "Present Reality", count: 30 }, { name: "Functional Comms", count: 40 }] },
    { title: "Musim 2: Arsitek Kata", desc: "Struktur kalimat dan tenses.", themes: [{ name: "Time Continuum", count: 20 }, { name: "Syntax", count: 30 }, { name: "Descriptive", count: 30 }, { name: "Practical", count: 20 }] },
    { title: "Musim 3: Konektor", desc: "Kalimat kompleks dan nuansa.", themes: [{ name: "Perfect Tenses", count: 30 }, { name: "Linkers", count: 30 }, { name: "Modals", count: 20 }, { name: "Social", count: 20 }] },
    { title: "Musim 4: The Analyst", desc: "Analisa dan komunikasi profesional.", themes: [{ name: "Passive", count: 30 }, { name: "Conditionals", count: 30 }, { name: "Reported", count: 20 }, { name: "Professional", count: 20 }] },
    { title: "Musim 5: The Diplomat", desc: "Soft skills dan idiomatik.", themes: [{ name: "Corporate", count: 30 }, { name: "Idioms", count: 30 }, { name: "Listening", count: 20 }, { name: "Persuasion", count: 20 }] },
    { title: "Musim 6: The Academic", desc: "Akademik: esai dan debat.", themes: [{ name: "Adv Grammar", count: 30 }, { name: "Writing", count: 30 }, { name: "Reading", count: 20 }, { name: "Debate", count: 20 }] },
    { title: "Musim 7: The Executive", desc: "Kepemimpinan dan strategi.", themes: [{ name: "Leadership", count: 30 }, { name: "Strategy", count: 30 }, { name: "Crisis", count: 20 }, { name: "Presence", count: 20 }] },
    { title: "Musim 8: The Specialist", desc: "Bahasa teknis industri.", themes: [{ name: "STEM", count: 20 }, { name: "Medical", count: 20 }, { name: "Tech", count: 20 }, { name: "Creative", count: 40 }] },
    { title: "Musim 9: The Globalist", desc: "Budaya global dan networking.", themes: [{ name: "Culture", count: 30 }, { name: "Literary", count: 30 }, { name: "Network", count: 20 }, { name: "Storytelling", count: 20 }] },
    { title: "Musim 10: The Polymath", desc: "Penyempurnaan akhir.", themes: [{ name: "Perfection", count: 30 }, { name: "Linguistics", count: 30 }, { name: "Thought Lead", count: 20 }, { name: "Final", count: 20 }] }
];

// ===== DATA JUDUL (EDIT DI SINI) =====
const episodeTitles = {
    1: "Pengenalan: Cara Otak Mempelajari Bahasa",
    2  : "Phonemes: Dasar Bunyi"
    3  : "Phonemes: Bunyi Konsonan"
    4  : "Phonemes: Gabung Bunyi"
    5  : "Intonation: Naik Turun Nada"
    6  : "Phonemes: Stress & Ritme"
    7  : "Phonemes: Minimal Pairs"
    8  : "Phonemes: Connected Speech"
    9  : "Phonemes: Latihan Kelancaran"
    10 : "Phonemes: Final Practice"
    100: "Milestone: Review 100 Episode Pertama",
    500: "Mid-Curriculum: Dari Dasar ke Menengah",
    1000: "Grand Finale: Dari Learner menjadi Master"
};

// State
let currentSeason = 0;
let currentPage = 1;
let perPage = 50;
let searchQuery = '';
let allEpisodes = [];

// Functions
function buildEpisodeArray(seasonIndex) {
    const episodes = [];
    let epNum = 1;
    
    for (let s = 0; s < seasons.length; s++) {
        const season = seasons[s];
        for (const theme of season.themes) {
            for (let i = 0; i < theme.count; i++) {
                if (s === seasonIndex) {
                    episodes.push({
                        num: epNum,
                        title: episodeTitles[epNum] || `Episode ${epNum}`,
                        theme: theme.name
                    });
                }
                epNum++;
            }
        }
    }
    return episodes;
}

function selectSeason(index) {
    currentSeason = index;
    currentPage = 1;
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === index));
    
    const season = seasons[index];
    document.getElementById('seasonTitle').textContent = season.title;
    document.getElementById('seasonDesc').textContent = season.desc;
    
    allEpisodes = buildEpisodeArray(index);
    
    let startEp = 1;
    for (let i = 0; i < index; i++) { for (const t of seasons[i].themes) startEp += t.count; }
    document.getElementById('episodeRange').textContent = `Episode ${startEp} - ${startEp + allEpisodes.length - 1}`;
    
    renderEpisodes();
}

function renderEpisodes() {
    const filtered = searchQuery
        ? allEpisodes.filter(ep => ep.title.toLowerCase().includes(searchQuery) || ep.num.toString().includes(searchQuery) || ep.theme.toLowerCase().includes(searchQuery))
        : allEpisodes;
    
    const totalPages = Math.ceil(filtered.length / perPage);
    if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
    
    const start = (currentPage - 1) * perPage;
    const pageEpisodes = filtered.slice(start, start + perPage);
    
    const grid = document.getElementById('episodeGrid');
    
    if (pageEpisodes.length === 0) {
        grid.innerHTML = `<div class="empty-state">Tidak ada episode ditemukan untuk "<b>${searchQuery}</b>"</div>`;
    } else {
        grid.innerHTML = pageEpisodes.map(ep => `
            <a href="${LINK_PREFIX}${ep.num}${LINK_SUFFIX}" class="ep-card">
                <div class="ep-num">${ep.num}</div>
                <div class="ep-info">
                    <div class="ep-title">${ep.title}</div>
                    <div class="ep-theme">${ep.theme}</div>
                </div>
                <div class="ep-arrow">→</div>
            </a>
        `).join('');
    }
    
    renderPagination(totalPages, filtered.length);
    
    const info = filtered.length > 0 ? `Menampilkan ${start + 1}-${Math.min(start + perPage, filtered.length)} dari ${filtered.length}` : '';
    document.getElementById('pageInfo').textContent = info;
}

function renderPagination(totalPages) {
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    
    let html = `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
    
    // Logic simple pagination for mobile
    let pages = [];
    if (totalPages <= 5) {
        pages = Array.from({length: totalPages}, (_, i) => i + 1);
    } else {
        if (currentPage <= 3) pages = [1, 2, 3, 4, '...', totalPages];
        else if (currentPage >= totalPages - 2) pages = [1, '...', totalPages-3, totalPages-2, totalPages-1, totalPages];
        else pages = [1, '...', currentPage-1, currentPage, currentPage+1, '...', totalPages];
    }
    
    pages.forEach(p => {
        if (p === '...') html += `<span class="page-dots">...</span>`;
        else html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
    });
    
    html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>→</button>`;
    pag.innerHTML = html;
}

function goToPage(p) { currentPage = p; renderEpisodes(); window.scrollTo({top: 200, behavior: 'smooth'}); }

// Init
const navTabs = document.getElementById('navTabs');
seasons.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = s.title.split(':')[0];
    btn.onclick = () => selectSeason(i);
    navTabs.appendChild(btn);
});

document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(window.searchTimer);
    window.searchTimer = setTimeout(() => {
        searchQuery = e.target.value.toLowerCase().trim();
        currentPage = 1;
        renderEpisodes();
    }, 300);
});

document.getElementById('perPageSelect').addEventListener('change', (e) => {
    perPage = parseInt(e.target.value);
    currentPage = 1;
    renderEpisodes();
});

selectSeason(0);
</script>
</body>
</html>
