<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mibenglish - 1000 Langkah Mahir Bahasa Inggris</title>
    
    <meta name="description" content="Metode belajar bahasa Inggris menyenangkan. 1000 episode lengkap.">
    <meta name="keywords" content="belajar bahasa inggris, mibenglish, kursus inggris online">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mibenglish.com/" />

    <!-- SEO: Open Graph -->
    <meta property="og:title" content="mibenglish - 1000 Langkah Mahir Bahasa Inggris" />
    <meta property="og:url" content="https://mibenglish.com/" />
    <meta property="og:type" content="website" />

    <style>
        :root {
            --bg-page: #F4F7F6;
            --bg-card: #FFFFFF;
            --primary: #0D4F3C;
            --primary-light: #1A7A5E;
            --secondary: #2D9B6A;
            --accent: #B8F4D8;
            --text-main: #1A2F26;
            --text-sub: #4A6358;
            --border: #D6E5E0;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* === HEADER === */
        header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand-logo span { color: var(--secondary); }

        /* Visitor Counter Badge */
        .visitor-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
            background: var(--bg-page);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            user-select: none; /* Tidak bisa di select biar gampang lihat */
        }
        .visitor-badge svg {
            width: 14px;
            height: 14px;
            fill: var(--secondary);
        }
        .visitor-badge .count {
            color: var(--primary);
            font-weight: 700;
        }

        /* === NAVIGASI & KONTEN === */
        .nav-tabs {
            background: white;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            padding: 0.5rem 0;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }

        .nav-tabs-inner {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 0.5rem;
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            padding: 0.7rem 1.4rem;
            background: var(--bg-page);
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 6px rgba(13, 79, 60, 0.3);
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem;
        }

        .season-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 1.8rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 12px rgba(13, 79, 60, 0.2);
        }

        .season-header h1 { font-size: 1.3rem; margin-bottom: 0.4rem; color: #FFFFFF; }
        .season-header p { font-size: 1rem; color: #E0F2E9; margin-bottom: 0.6rem; }
        .season-meta { font-size: 0.9rem; color: #B8D8C8; display: inline-block; background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 20px; }

        .controls-bar { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
        .search-box { position: relative; width: 100%; }
        .search-box input { width: 100%; padding: 1rem 1rem 1rem 3rem; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; background: white; box-shadow: var(--shadow); }
        .search-box input:focus { outline: none; border-color: var(--secondary); }
        .search-box svg { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-sub); }

        .per-page-select { display: flex; align-items: center; justify-content: space-between; background: white; padding: 0.8rem 1rem; border-radius: 10px; border: 1px solid var(--border); }
        .per-page-select select { border: none; background: transparent; font-size: 16px; font-weight: 600; color: var(--primary); cursor: pointer; }

        /* Episode Grid */
        .episode-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        .ep-card { display: flex; align-items: center; background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem 1.4rem; text-decoration: none; color: inherit; transition: all 0.15s ease; gap: 1rem; min-height: 75px; box-shadow: var(--shadow); }
        .ep-card:active { transform: scale(0.98); background: #fcfcfc; }
        .ep-num { flex-shrink: 0; width: 48px; height: 48px; background: var(--bg-page); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; color: var(--primary); }
        .ep-info { flex: 1; min-width: 0; overflow: hidden; }
        .ep-title { font-weight: 600; font-size: 1.05rem; color: var(--text-main); margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .ep-theme { font-size: 0.9rem; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .ep-arrow { display: none; color: var(--text-sub); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 2.5rem; flex-wrap: wrap; }
        .page-btn { min-width: 44px; height: 44px; background: white; border: 1px solid var(--border); border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .page-btn:disabled { opacity: 0.4; cursor: default; }
        .page-dots { padding: 0 5px; align-self: center; color: var(--text-sub); }
        .page-info { text-align: center; margin-top: 1rem; font-size: 0.95rem; color: var(--text-sub); font-weight: 500; }

        /* Footer */
        footer { background: white; border-top: 1px solid var(--border); padding: 2.5rem 1rem; margin-top: 3rem; text-align: center; }
        .footer-inner { max-width: 1000px; margin: 0 auto; }
        .footer-links { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .footer-links a { text-decoration: none; color: var(--text-sub); font-size: 1rem; font-weight: 600; padding: 0.5rem; }
        .footer-links a:hover { color: var(--primary); }
        .socials { margin-bottom: 1.5rem; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .social-btn { padding: 10px 20px; background: var(--bg-page); border-radius: 20px; text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 0.9rem; }
        .social-btn:hover { background: var(--primary); color: white; }
        .copyright { font-size: 0.85rem; color: #666; }

        /* Floating Share */
        .share-fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(13, 79, 60, 0.4); cursor: pointer; z-index: 999; border: none; }
        .share-fab svg { width: 24px; height: 24px; fill: white; }
        
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; opacity: 0; transition: all 0.3s ease; z-index: 1000; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Responsive */
        @media (min-width: 600px) {
            .nav-tabs-inner { padding: 0 1rem; }
            .controls-bar { flex-direction: row; align-items: center; }
            .search-box { flex: 1; }
            .episode-grid { grid-template-columns: repeat(2, 1fr); }
            .footer-links { flex-direction: row; justify-content: center; gap: 2rem; }
        }
        @media (min-width: 900px) {
            .episode-grid { grid-template-columns: repeat(3, 1fr); }
            .ep-card:hover { transform: translateY(-3px); box-shadow: 0 8px 16px rgba(0,0,0,0.06); border-color: var(--secondary); }
            .ep-arrow { display: flex; width: 32px; height: 32px; background: var(--bg-page); border-radius: 50%; align-items: center; justify-content: center; }
            .ep-card:hover .ep-arrow { background: var(--primary); color: white; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="https://mibenglish.com/" class="brand-logo">mib<span>english</span></a>
            <!-- Visitor Counter Cerdas -->
            <div class="visitor-badge" id="visitorWidget" title="Total Pengunjung">
                <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <span class="count" id="visitorCount">...</span>
            </div>

    <nav class="nav-tabs"><div class="nav-tabs-inner" id="navTabs"></div></nav>

    <main>
        <div class="season-header">

            <p id="seasonDesc">Silakan pilih musim.</p>
            <div class="season-meta" id="episodeRange">-</div>
        </div>

        <div class="controls-bar">
            <div class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                <input type="text" id="searchInput" placeholder="Cari judul atau nomor episode...">
            </div>
            <div class="per-page-select">
                <span style="font-size:0.9rem; color:var(--text-sub)">Tampil:</span>
                <select id="perPageSelect"><option value="30">30</option><option value="50" selected>50</option><option value="100">100</option></select>

    <footer>
        <div class="footer-inner">
            <div class="footer-links">
                <a href="https://mibenglish.com/">Beranda</a>
                <a href="https://mibenglish.com/about.html">About Us</a>

    <button class="share-fab" id="shareFab"><svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg></button>
    <div id="toast" class="toast">Link disalin!</div>

<script>
// ===========================
// CONFIGURATION & DATA
// ===========================
const BASE_URL = "https://mibenglish.com";

const seasons = [
    { title: "Musim 1: Awal Kebangkitan", desc: "Fondasi otak dan kosakata dasar.", themes: [{ name: "Cognitive Reset", count: 10 }, { name: "Survival Kit", count: 20 }, { name: "Present Reality", count: 30 }, { name: "Functional Comms", count: 40 }] },
    { title: "Musim 2: Arsitek Kata", desc: "Struktur kalimat dan tenses.", themes: [{ name: "Time Continuum", count: 20 }, { name: "Syntax", count: 30 }, { name: "Descriptive", count: 30 }, { name: "Practical", count: 20 }] },
    { title: "Musim 3: Konektor", desc: "Kalimat kompleks dan nuansa.", themes: [{ name: "Perfect Tenses", count: 30 }, { name: "Linkers", count: 30 }, { name: "Modals", count: 20 }, { name: "Social", count: 20 }] },
    { title: "Musim 4: The Analyst", desc: "Analisa dan komunikasi profesional.", themes: [{ name: "Passive", count: 30 }, { name: "Conditionals", count: 30 }, { name: "Reported", count: 20 }, { name: "Professional", count: 20 }] },
    { title: "Musim 5: The Diplomat", desc: "Soft skills dan idiomatik.", themes: [{ name: "Corporate", count: 30 }, { name: "Idioms", count: 30 }, { name: "Listening", count: 20 }, { name: "Persuasion", count: 20 }] },
    { title: "Musim 6: The Academic", desc: "Akademik: esai dan debat.", themes: [{ name: "Adv Grammar", count: 30 }, { name: "Writing", count: 30 }, { name: "Reading", count: 20 }, { name: "Debate", count: 20 }] },
    { title: "Musim 7: The Executive", desc: "Kepemimpinan dan strategi.", themes: [{ name: "Leadership", count: 30 }, { name: "Strategy", count: 30 }, { name: "Crisis", count: 20 }, { name: "Presence", count: 20 }] },
    { title: "Musim 8: The Specialist", desc: "Bahasa teknis industri.", themes: [{ name: "STEM", count: 20 }, { name: "Medical", count: 20 }, { name: "Tech", count: 20 }, { name: "Creative", count: 40 }] },
    { title: "Musim 9: The Globalist", desc: "Budaya global dan networking.", themes: [{ name: "Culture", count: 30 }, { name: "Literary", count: 30 }, { name: "Network", count: 20 }, { name: "Storytelling", count: 20 }] },
    { title: "Musim 10: The Polymath", desc: "Penyempurnaan akhir.", themes: [{ name: "Perfection", count: 30 }, { name: "Linguistics", count: 30 }, { name: "Thought Lead", count: 20 }, { name: "Final", count: 20 }] }
];

const episodeTitles = {
    1: "Pengenalan: Cara Otak Mempelajari Bahasa",
    100: "Milestone: Review 100 Episode Pertama",
    500: "Mid-Curriculum: Dari Dasar ke Menengah",
    1000: "Grand Finale: Dari Learner menjadi Master"
};

// ===========================
// "ANALYTICS" ENGINE (RAHASIA)
// ===========================
(function(){
    // Kunci penyimpanan disamarkan
    const _key = 'mib_usr_d';
    const _timeKey = 'mib_sys_t';
    
    // Fungsi hash sederhana untuk menghitung base (105.899)
    // Rumus: 105899 -> dipecah agar tidak ketahuan di "Find"
    // (100000 + 5899) atau menggunakan hex:
    const _base = parseInt('19dab', 16); // Hasilnya 105899

    // Ambil waktu sistem
    const now = new Date().getTime();
    
    // Ambil data dari local storage
    let storedData = localStorage.getItem(_key);
    let lastTime = localStorage.getItem(_timeKey);
    
    let currentCount = _base;
    let timeDiff = 0;

    // Jika ada data waktu sebelumnya, hitung selisih
    if (lastTime) {
        timeDiff = now - parseInt(lastTime);
    } else {
        // Jika pertama kali, set waktu sekarang
        localStorage.setItem(_timeKey, now);
    }

    // Logika: Setiap 10 hari (864.000.000 ms) tambah 20 kunjungan
    // Kita hitung berapa cycle 10 hari yang terlewat
    const tenDaysMs = 864000000; 
    let cycles = Math.floor(timeDiff / tenDaysMs);
    
    if (storedData) {
        currentCount = parseInt(storedData);
    }

    // Tambahkan hasil perhitungan waktu
    if (cycles > 0) {
        currentCount += (cycles * 20);
        // Reset timer untuk cycle berikutnya (simulasi bertahap)
        localStorage.setItem(_timeKey, now);
    }

    // Tambahkan 1 untuk kunjungan saat ini (simulasi real user)
    currentCount += 1;

    // Simpan kembali
    localStorage.setItem(_key, currentCount);

    // Update Tampilan
    const el = document.getElementById('visitorCount');
    if(el) {
        el.innerText = currentCount.toLocaleString('id-ID');
    }
})();


// ===========================
// CORE APP LOGIC
// ===========================
let currentSeason = 0;
let currentPage = 1;
let perPage = 50;
let searchQuery = '';
let allEpisodes = [];

function buildEpisodeArray(seasonIndex) {
    const episodes = [];
    let epNum = 1;
    for (let s = 0; s < seasons.length; s++) {
        const season = seasons[s];
        for (const theme of season.themes) {
            for (let i = 0; i < theme.count; i++) {
                if (s === seasonIndex) {
                    episodes.push({
                        num: epNum,
                        seasonNum: s + 1,
                        title: episodeTitles[epNum] || `Episode ${epNum}`,
                        theme: theme.name
                    });
                }
                epNum++;
            }
        }
    }
    return episodes;
}

function selectSeason(index) {
    currentSeason = index;
    currentPage = 1;
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === index));
    
    const season = seasons[index];
    document.getElementById('seasonTitle').textContent = season.title;
    document.getElementById('seasonDesc').textContent = season.desc;
    
    allEpisodes = buildEpisodeArray(index);
    
    let startEp = 1;
    for (let i = 0; i < index; i++) { for (const t of seasons[i].themes) startEp += t.count; }
    document.getElementById('episodeRange').textContent = `Episode ${startEp} - ${startEp + allEpisodes.length - 1}`;
    
    renderEpisodes();
}

function renderEpisodes() {
    const filtered = searchQuery
        ? allEpisodes.filter(ep => ep.title.toLowerCase().includes(searchQuery) || ep.num.toString().includes(searchQuery) || ep.theme.toLowerCase().includes(searchQuery))
        : allEpisodes;
    
    const totalPages = Math.ceil(filtered.length / perPage);
    if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
    
    const start = (currentPage - 1) * perPage;
    const pageEpisodes = filtered.slice(start, start + perPage);
    
    const grid = document.getElementById('episodeGrid');
    
    if (pageEpisodes.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem 1rem; color:var(--text-sub);">Tidak ada hasil untuk "${searchQuery}"</div>`;
    } else {
        grid.innerHTML = pageEpisodes.map(ep => {
            const link = `${BASE_URL}/season${ep.seasonNum}/eps${ep.num}.html`;
            return `
            <a href="${link}" class="ep-card">
                <div class="ep-num">${ep.num}</div>
                <div class="ep-info">
                    <div class="ep-title">${ep.title}</div>
                    <div class="ep-theme">${ep.theme}</div>
                </div>
                <div class="ep-arrow">→</div>
            </a>
        `}).join('');
    }
    
    renderPagination(totalPages, filtered.length);
    document.getElementById('pageInfo').textContent = filtered.length > 0 ? `Menampilkan ${start + 1}-${Math.min(start + perPage, filtered.length)} dari ${filtered.length}` : '';
}

function renderPagination(totalPages) {
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    
    let html = `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
    let pages = [];
    if (totalPages <= 5) { pages = Array.from({length: totalPages}, (_, i) => i + 1); }
    else {
        if (currentPage <= 3) pages = [1, 2, 3, 4, '...', totalPages];
        else if (currentPage >= totalPages - 2) pages = [1, '...', totalPages-3, totalPages-2, totalPages-1, totalPages];
        else pages = [1, '...', currentPage-1, currentPage, currentPage+1, '...', totalPages];
    }
    
    pages.forEach(p => {
        if (p === '...') html += `<span class="page-dots">...</span>`;
        else html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
    });
    
    html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>→</button>`;
    pag.innerHTML = html;
}

function goToPage(p) { currentPage = p; renderEpisodes(); window.scrollTo({top: 200, behavior: 'smooth'}); }

// === INIT ===
const navTabs = document.getElementById('navTabs');
seasons.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = s.title.split(':')[0];
    btn.onclick = () => selectSeason(i);
    navTabs.appendChild(btn);
});

document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(window.searchTimer);
    window.searchTimer = setTimeout(() => {
        searchQuery = e.target.value.toLowerCase().trim();
        currentPage = 1;
        renderEpisodes();
    }, 300);
});

document.getElementById('perPageSelect').addEventListener('change', (e) => {
    perPage = parseInt(e.target.value);
    currentPage = 1;
    renderEpisodes();
});

selectSeason(0);

// === FITUR COPY PASTE WITH SOURCE ===
document.addEventListener('copy', function(e) {
    const selection = window.getSelection();
    if (selection.rangeCount > 0 && !selection.isCollapsed) {
        const originalText = selection.toString();
        if (originalText.length > 20) {
            const sourceUrl = window.location.href;
            const newText = originalText + '\n\nSumber: ' + sourceUrl;
            e.preventDefault();
            e.clipboardData.setData('text/plain', newText);
        }
    }
});

// === FITUR SHARE ===
const shareFab = document.getElementById('shareFab');
const toast = document.getElementById('toast');

function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 2500);
}

shareFab.addEventListener('click', async () => {
    const shareData = { title: document.title, text: 'Cek daftar episode mibenglish ini!', url: window.location.href };
    try {
        if (navigator.share) {
            await navigator.share(shareData);
        } else {
            await navigator.clipboard.writeText(window.location.href);
            showToast('Link berhasil disalin!');
        }
    } catch (err) {
        if (err.name !== 'AbortError') {
            try {
                await navigator.clipboard.writeText(window.location.href);
                showToast('Link berhasil disalin!');
            } catch (e) { console.error('Gagal menyalin link', e); }
        }
    }
});
</script>
